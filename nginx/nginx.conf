events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Otimizações básicas
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip para comprimir respostas (melhora performance)
    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Definição do servidor Next.js na rede do Docker
    upstream nextjs_upstream {
        # 'incinera-web' é o nome do serviço no docker-compose.yml
        server incinera-web:3000;
    }

    server {
        listen 80;
        server_name incinera.cin.ufpe.br vm-incinera.cin.ufpe.br localhost; # Pode ser substituído pelo domínio da atlética (ex: incinera.cin.ufpe.br)

        # Configuração de segurança de cabeçalhos
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1";
        add_header X-Content-Type-Options "nosniff";

        # Configuração principal - Proxy Reverso para o Next.js
        location / {
            proxy_pass http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Intercepta erros que vêm do upstream (Next.js)
            proxy_intercept_errors on;
            error_page 404 = @notfound;
        }

        # Tratamento de arquivos estáticos gerados pelo Next.js (bypass do Node)
        location /_next/static/ {
            proxy_pass http://nextjs_upstream;
            proxy_cache_bypass $http_upgrade;
            
            # Cache agressivo para assets estáticos com hash
            expires 1y;
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Cache para imagens e assets estáticos do public/
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|otf)$ {
            proxy_pass http://nextjs_upstream;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            access_log off;
        }

        # Regra customizada: Se der 404, faz um redirecionamento 302 temporário para a Home (/)
        location @notfound {
            return 302 /;
        }
    }
}
